# =============================================================================
# 부하테스트용 override — spring-boot 8080 포트 노출
# =============================================================================
# 운영에선 nginx가 내부망으로만 접근하므로 backend.yml 에 ports 가 없음.
# nginx 없이 K6 가 직접 http://<B_IP>:8080 으로 때리려면 포트를 열어야 함.
#
# 실행:
#   docker compose -f docker-compose.backend.yml -f docker-compose.backend.loadtest.yml up -d
# =============================================================================

services:
  spring-boot:
    ports:
      - "8080:8080"
