services:
  postgresql:
    image: postgis/postgis:16-3.4
    container_name: postgresql
    env_file: .env
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  redis:
    image: redis:alpine
    container_name: redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  kafka:
    image: apache/kafka:3.9.0
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5
    networks:
      - app-network

  nginx:
    image: nginx:latest
    container_name: nginx
    ports:
      - "80:80"    # HTTP (certbot challenge + HTTPS 리다이렉트)
      - "443:443"  # HTTPS
    volumes:
      # Nginx 설정 파일 마운트 (conf.d/ 안의 .conf 파일들이 자동으로 로드됨)
      - ./nginx/conf.d:/etc/nginx/conf.d
      # Let's Encrypt 인증서 디렉토리 공유 (certbot 컨테이너와 동일 경로)
      - ./certbot/conf:/etc/letsencrypt
      # certbot HTTP challenge용 webroot 공유
      - ./certbot/www:/var/www/certbot
    networks:
      - app-network

  # certbot: Let's Encrypt 인증서 발급 및 자동 갱신
  # 실제 인증서 발급은 아래 '최초 인증서 발급' 섹션 참고
  certbot:
    image: certbot/certbot
    container_name: certbot
    volumes:
      # Nginx와 동일한 경로를 공유해야 인증서를 Nginx가 읽을 수 있음
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    # 12시간마다 인증서 갱신 시도 (Let's Encrypt 인증서 유효기간 90일)
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

networks:
  app-network:
    external: true

