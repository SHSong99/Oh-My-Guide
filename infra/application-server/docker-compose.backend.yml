services:
  spring-boot:
    image: oh-my-guide-backend:latest
    container_name: spring-boot
    env_file: ../../backend/.env
    # ports 제거: 외부에서 직접 접근 불가
    # Nginx가 Docker 내부 네트워크(app-network)를 통해 컨테이너 이름으로 접근
    # 외부 → Nginx(443) → spring-boot:8080 (내부망)
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

networks:
  app-network:
    external: true
