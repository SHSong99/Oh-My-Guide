# ============================================================
# HTTP 서버 블록
# 역할:
#   1. Let's Encrypt 인증서 발급/갱신을 위한 challenge 경로 제공
#   2. 나머지 모든 HTTP 요청을 HTTPS로 리다이렉트
# ============================================================
server {
    listen 80;
    server_name j14e103a.p.ssafy.io;

    # certbot이 도메인 소유권 검증 시 사용하는 경로
    # certbot이 이 경로에 임시 파일을 생성하고, Let's Encrypt 서버가 접근해서 확인함
    # 컨테이너 내부 /var/www/certbot 디렉토리를 호스트와 공유 (volume mount)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # 위 경로 외 모든 요청은 HTTPS로 301 영구 리다이렉트
    location / {
        return 301 https://$host$request_uri;
    }
}

# ============================================================
# HTTPS 서버 블록
# 역할: SSL 종료(termination) + 리버스 프록시
#   - 클라이언트(Android 앱)와는 HTTPS로 통신
#   - 내부 서비스(Spring Boot, FastAPI)와는 HTTP로 통신 (Docker 내부망)
#
# TODO: 인증서 발급 완료 후 아래 주석 해제
# 발급 명령어:
#   docker compose -f docker-compose.infra.yml run --rm certbot certonly \
#     --webroot --webroot-path=/var/www/certbot \
#     --email your-email@example.com --agree-tos --no-eff-email \
#     -d j14e103a.p.ssafy.io
# 발급 후: 아래 주석 해제 → docker compose ... restart nginx
# ============================================================

server {
    listen 443 ssl;
    server_name j14e103a.p.ssafy.io;

    # Let's Encrypt가 발급한 SSL 인증서 경로
    # certbot 컨테이너가 /etc/letsencrypt에 저장, Nginx 컨테이너와 volume 공유
    ssl_certificate     /etc/letsencrypt/live/j14e103a.p.ssafy.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/j14e103a.p.ssafy.io/privkey.pem;

    # --------------------------------------------------------
    # Spring Boot 라우팅
    # /api/ 로 시작하는 요청을 Spring Boot 컨테이너로 전달
    #
    # 예시:
    #   클라이언트 요청: GET https://j14e103a.p.ssafy.io/api/users/1
    #   Nginx 전달:      GET http://spring-boot:8080/users/1
    #
    # proxy_pass 끝에 /를 붙이면 location prefix(/api/)를 제거하고 전달
    # spring-boot 는 Docker 네트워크(app-network) 상의 컨테이너 이름
    # --------------------------------------------------------
    location /api/ {
        proxy_pass http://spring-boot:8080/;

        # 원본 클라이언트 정보를 백엔드에 전달하는 헤더들
        proxy_set_header Host              $host;               # 원본 도메인
        proxy_set_header X-Real-IP         $remote_addr;        # 클라이언트 실제 IP
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for; # 프록시 경유 IP 목록
        proxy_set_header X-Forwarded-Proto $scheme;             # 원본 프로토콜 (https)
    }

    # --------------------------------------------------------
    # FastAPI 라우팅
    # /ai/ 로 시작하는 요청을 FastAPI 컨테이너로 전달
    #
    # 예시:
    #   클라이언트 요청: GET https://j14e103a.p.ssafy.io/ai/health
    #   Nginx 전달:      GET http://fastapi:8000/health
    # --------------------------------------------------------
    location /ai/ {
        proxy_pass http://fastapi:8000/;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --------------------------------------------------------
    # Jenkins 라우팅
    # /jenkins/ 로 시작하는 요청을 Jenkins 컨테이너로 전달
    #
    # 예시:
    #   클라이언트 요청: GET https://j14e103a.p.ssafy.io/jenkins/
    #   Nginx 전달:      GET http://jenkins:8080/jenkins/
    #
    # Spring Boot/FastAPI와 달리 prefix를 제거하지 않음
    # → Jenkins가 --prefix=/jenkins 로 실행되므로 /jenkins/ 경로를 그대로 전달
    # proxy_redirect: Jenkins 내부에서 발생하는 http:// 리다이렉트를 https:// 로 변환
    # --------------------------------------------------------
    location /jenkins/ {
        proxy_pass http://jenkins:8080/jenkins/;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;             # Jenkins CSRF 검증용

        # Jenkins 내부 리다이렉트(http)를 외부 URL(https)로 변환
        proxy_redirect http://jenkins:8080/jenkins/ https://$host/jenkins/;

        # Jenkins 빌드는 오래 걸릴 수 있으므로 타임아웃 늘림
        proxy_read_timeout 90s;
    }
}
