<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Naver Map Test</title>
  <style>
    #map { width: 100%; height: 500px; }
    #log { padding: 20px; font-family: monospace; white-space: pre-wrap; background: #f5f5f5; margin: 10px; }
  </style>
</head>
<body>
  <h2>Naver Map API Test</h2>
  <div id="log">Loading...</div>
  <div id="map"></div>

  <script>
    var log = document.getElementById('log');
    function addLog(msg) {
      log.textContent += '\n' + msg;
      console.log(msg);
    }

    addLog('Page URL: ' + window.location.href);
    addLog('Client ID: dreiik2e8f');
  </script>

  <script 
    src="https://oapi.map.naver.com/openapi/v3/maps.js?ncpClientId=dreiik2e8f"
    onload="onSdkLoad()"
    onerror="onSdkError()"
  ></script>

  <script>
    function onSdkError() {
      addLog('ERROR: SDK script failed to load');
    }

    function onSdkLoad() {
      addLog('SDK script loaded successfully');
      addLog('typeof naver: ' + typeof naver);
      addLog('typeof naver.maps: ' + (typeof naver !== 'undefined' ? typeof naver.maps : 'naver undefined'));

      if (typeof naver !== 'undefined' && naver.maps) {
        try {
          var map = new naver.maps.Map('map', {
            center: new naver.maps.LatLng(37.5665, 126.978),
            zoom: 13
          });
          addLog('Map created successfully!');

          // Check if map renders properly after a moment
          setTimeout(function() {
            var mapDiv = document.getElementById('map');
            var hasCanvas = mapDiv.querySelector('canvas');
            var hasImg = mapDiv.querySelector('img');
            addLog('Map has canvas: ' + !!hasCanvas);
            addLog('Map has images: ' + !!hasImg);
            addLog('Map div children: ' + mapDiv.children.length);
          }, 3000);
        } catch (e) {
          addLog('ERROR creating map: ' + e.message);
        }
      } else {
        addLog('ERROR: naver.maps not available');
      }
    }
  </script>
</body>
</html>
